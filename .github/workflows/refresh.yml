name: Refresh NRL ladder

on:
  schedule:
    - cron: '0 */6 * * *'      # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest ladder
        run: node scripts/fetch-ladder.mjs

      - name: Commit if ladder changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/ladder.json
          if git diff --cached --quiet; then
            echo "No ladder changes to commit."
          else
            git commit -m "Refresh ladder ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest deploy
